<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canteen Order Form</title>
    <style>
        
    </style>
</head>
<body>

    <h2>Order Form</h2>
    <form id="orderForm" onsubmit="return printReceipt()">
        
        <div class="form-group">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" required>
        </div>

        <div class="form-group">
            <label for="gradeSection">Grade & Section:</label>
            <input type="text" id="gradeSection" placeholder="NA for F&S" required>
        </div>

        <div class="form-group">
            <label for="foodItem">Food:</label>
            <select id="foodItem">
                <option value="Chicken meal">Chicken meal (PHP 75)</option>
                <option value="Pork meal">Pork meal (PHP 85)</option>
                <option value="Beef meal">Beef meal (PHP 105)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="quantity">Quantity (Max of 5):</label>
            <input type="number" id="quantity" min="1" max="5" required>
        </div>

        <div class="form-group">
            <label for="custType">Customer Type</label>
            <select id="custType">
                <option value="Student">Student</option>
                <option value="Faculty/Staff">Faculty/Staff</option>
            </select>
        </div>

        <button type="submit">Place Order</button>
    </form>

    <div id="orderSummary">
        <h2>ORDER SUMMARY</h2>
        <div id="receipt"></div>
    </div>

    <script>
        function calculateSubtotal(order, quantity) {
            let price = 0;
            switch(order) {
                case "Chicken meal": price = 75; break;
                case "Pork meal": price = 85; break;
                case "Beef meal": price = 105; break;
                default: return "Item not found";
            }
            return price * quantity;
        }

        function calculateDiscount(total, custType) {
            if (custType === "Student") {
                return total * 0.20;
            } else {
                return 0;
            }
        }

        function printReceipt() {
            const name = document.getElementById('fullName').value;
            const grade = document.getElementById('gradeSection').value;
            const food = document.getElementById('foodItem').value;
            const qty = parseInt(document.getElementById('quantity').value);
            const type = document.getElementById('custType').value;

            const subtotal = calculateSubtotal(food, qty);
            const discount = calculateDiscount(subtotal, type);
            const finalTotal = subtotal - discount;

            const receiptHTML = `
                <p>Name: ${name}</p>
                <p>Grade & Section: ${grade}</p>
                <p>Order: ${food}</p>
                <p>Quantity: ${qty}</p>
                <p>Subtotal: PHP ${subtotal}</p>
                <p>Discount: PHP ${discount}</p>
                <p>Total: PHP ${finalTotal}</p>
                <p><strong>Thank you for your patronage!</strong></p>
            `;

            document.getElementById('receipt').innerHTML = receiptHTML;

            return false;
        }
    </script>
</body>
</html>
